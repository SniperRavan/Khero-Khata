  </aside>

  <!-- Main body of home -->
  <main id="app-container">
    <section id="dashboard-view">
      <header class="page-header">
        <h1>Good Morning, Sniper !</h1>
      </header>
      <div class="home-grid">
        <article class="card my-day">
          <div class="card-header">
            <h3>My Day</h3>
            <span class="dots">...</span>
          </div>

          <ul class="task-list">
            <li class="task-item">
              <div class="checkbox"></div>
              <span class="task-text">Team Standup @10 AM</span>
              <span class="tag urgency">Urgency</span>
            </li>

            <li class="task-item">
              <div class="checkbox"></div>
              <span class="task-text">Review Project Proposal</span>
              <span class="tag urgency">Urgency</span>
            </li>
            
            <li class="task-item">
              <div class="checkbox"></div>
              <span class="task-text">Audit Reclaimx Repository</span>
              <span class="tag urgency">Urgency</span>
            </li>
          </ul>
        </article>
        <article class="card upcoming">Upcoming Task</article>
        <article class="card team-updates">Team Upadates</article>
        <article class="card add-task">
          <div class="card-header">
            <h3>Add Task</h3>
          </div>

          <div class="input-groove">
            <input type="text" placeholder="Add a new task..." id="quick-task-input">
            <button class="add-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </button>
          </div>
        </article>
        <article class="card calender-widget">Calender</article>
      </div>
    </section>
  </main>
  <script src="js/router.js"></script>
  <script src="js/theme.js"></script>
</body>
</html>
